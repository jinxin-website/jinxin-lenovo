<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>全部产品 - 成都金信佳业科技</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .header { background: #ED1C24; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .header a { color: white; text-decoration: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .filters { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .filter-btn { padding: 8px 25px; border: 1px solid #ddd; background: white; border-radius: 30px; cursor: pointer; transition: 0.3s; }
        .filter-btn.active, .filter-btn:hover { background: #ED1C24; color: white; border-color: #ED1C24; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-decoration: none; color: #333; display: block; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .product-card h3 { margin: 10px 0; }
        .price { color: #ED1C24; font-weight: bold; margin-top: 10px; }
        footer { background: #222; color: #999; text-align: center; padding: 20px; margin-top: 40px; }
        .loading { text-align: center; padding: 50px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h2>成都金信佳业科技</h2>
        <a href="index.html">🏠 返回首页</a>
    </div>

    <div class="container">
        <div class="filters" id="filters">
            <button class="filter-btn active" data-cat="all">全部</button>
            <button class="filter-btn" data-cat="server">联想服务器</button>
            <button class="filter-btn" data-cat="workstation">ThinkStation工作站</button>
            <button class="filter-btn" data-cat="pc">联想品牌机</button>
        </div>
        <div id="productList" class="product-grid">加载中...</div>
    </div>

    <footer>
        <p>咨询热线：028-61111556 | 18108084533（微信同号）</p>
    </footer>

    <script>
        let allData = [];
        let currentCat = 'all';
        
        async function loadAll() {
            try {
                const res = await fetch('products-data/products.json');
                allData = await res.json();
                render();
            } catch(e) {
                document.getElementById('productList').innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        function render() {
            const filtered = currentCat === 'all' ? allData : allData.filter(p => p.category === currentCat);
            const container = document.getElementById('productList');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">暂无产品</div>';
                return;
            }
            container.innerHTML = filtered.map(p => `
                <a href="product.html?slug=${p.slug}" class="product-card">
                    <h3>${p.name}</h3>
                    <p style="color:#666; margin:10px 0">${p.description || ''}</p>
                    <div class="price">${p.price || '询价'}</div>
                </a>
            `).join('');
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCat = btn.dataset.cat;
                render();
            });
        });
        
        loadAll();
    </script>
</body>
</html>
