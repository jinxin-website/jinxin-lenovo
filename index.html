<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>成都金信佳业科技 - 联想服务器工作站代理商</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .header { background: #ED1C24; color: white; padding: 20px; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .category { margin-bottom: 40px; }
        .category h2 { border-left: 4px solid #ED1C24; padding-left: 15px; margin-bottom: 20px; color: #333; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-decoration: none; color: #333; display: block; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .product-card h3 { margin: 10px 0; font-size: 18px; }
        .price { color: #ED1C24; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .btn { display: inline-block; background: #ED1C24; color: white; padding: 10px 30px; border-radius: 30px; text-decoration: none; margin-top: 20px; }
        footer { background: #222; color: #999; text-align: center; padding: 30px; margin-top: 40px; }
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>成都金信佳业科技</h1>
        <p>联想服务器 · 工作站 · 品牌机专业提供商</p>
    </div>

    <div class="container">
        <!-- 联想服务器 -->
        <div class="category">
            <h2>🗄️ 联想服务器</h2>
            <div id="serverList" class="product-grid">加载中...</div>
        </div>

        <!-- ThinkStation工作站 -->
        <div class="category">
            <h2>💻 ThinkStation工作站</h2>
            <div id="workstationList" class="product-grid">加载中...</div>
        </div>

        <!-- 联想品牌机 -->
        <div class="category">
            <h2>🖥️ 联想品牌机</h2>
            <div id="pcList" class="product-grid">加载中...</div>
        </div>

        <div style="text-align: center;">
            <a href="products.html" class="btn">查看全部产品</a>
        </div>
    </div>

    <footer>
        <p>咨询热线：028-61111556 &nbsp;|&nbsp; 18108084533（微信同号）</p>
        <p>地址：成都市武侯区一环路南二段一号数码科技大厦720</p>
    </footer>

    <script>
        async function loadCategory(category, elementId, limit = 2) {
            try {
                const res = await fetch('products-data/products.json');
                const all = await res.json();
                const filtered = all.filter(p => p.category === category);
                const products = filtered.slice(0, limit);
                const container = document.getElementById(elementId);
                
                if (products.length === 0) {
                    container.innerHTML = '<div class="loading">暂无产品</div>';
                    return;
                }
                
                container.innerHTML = products.map(p => `
                    <a href="product.html?slug=${p.slug}" class="product-card">
                        <h3>${p.name}</h3>
                        <p style="color:#666; font-size:14px; margin:10px 0">${p.description || ''}</p>
                        <div class="price">${p.price || '询价'}</div>
                    </a>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById(elementId).innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        loadCategory('server', 'serverList', 2);
        loadCategory('workstation', 'workstationList', 2);
        loadCategory('pc', 'pcList', 2);
    </script>
</body>
</html>
