<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成都金信佳业科技 - 联想产品专家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .section-title { text-align: center; margin: 40px 0 30px; color: #ED1C24; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-decoration: none; color: #333; display: block; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 5px 20px rgba(0,0,0,0.15); }
        .product-card h3 { margin: 15px 0 10px; font-size: 18px; }
        .product-card p { color: #666; font-size: 14px; }
        .price { color: #ED1C24; font-weight: bold; margin-top: 10px; }
        .category-section { margin-bottom: 40px; }
        .category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-left: 4px solid #ED1C24; padding-left: 15px; }
        .more-link { color: #ED1C24; text-decoration: none; }
        .loading { text-align: center; padding: 50px; color: #999; }
        .btn { display: inline-block; background: #ED1C24; color: white; padding: 10px 30px; border-radius: 30px; text-decoration: none; margin-top: 20px; }
        footer { background: #222; color: #999; text-align: center; padding: 30px; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:#ED1C24; margin:30px 0">成都金信佳业科技</h1>
    <p style="text-align:center; margin-bottom:40px">联想服务器 · 工作站 · 品牌机专业提供商</p>

    <!-- 联想服务器 -->
    <div class="category-section">
        <div class="category-header">
            <h2>联想服务器</h2>
            <a href="products.html?cat=server" class="more-link">查看全部 →</a>
        </div>
        <div id="serverGrid" class="product-grid">加载中...</div>
    </div>

    <!-- ThinkStation工作站 -->
    <div class="category-section">
        <div class="category-header">
            <h2>ThinkStation工作站</h2>
            <a href="products.html?cat=workstation" class="more-link">查看全部 →</a>
        </div>
        <div id="workstationGrid" class="product-grid">加载中...</div>
    </div>

    <!-- 联想品牌机 -->
    <div class="category-section">
        <div class="category-header">
            <h2>联想品牌机</h2>
            <a href="products.html?cat=pc" class="more-link">查看全部 →</a>
        </div>
        <div id="pcGrid" class="product-grid">加载中...</div>
    </div>

    <div style="text-align:center">
        <a href="products.html" class="btn">浏览全部产品</a>
    </div>
</div>

<footer>
    <p>成都金信佳业科技有限公司 | 咨询热线：028-61111556</p>
    <p>地址：成都市武侯区一环路南二段一号数码科技大厦720</p>
</footer>

<script>
    // 加载产品数据
    async function loadProducts() {
        try {
            const response = await fetch('https://jinxin-website.github.io/jinxin-lenovo/products-data/products.json');
            const products = await response.json();
            
            // 按分类筛选
            const servers = products.filter(p => p.category === 'server');
            const workstations = products.filter(p => p.category === 'workstation');
            const pcs = products.filter(p => p.category === 'pc');
            
            // 渲染（每个分类最多2个）
            renderGrid('serverGrid', servers.slice(0, 2));
            renderGrid('workstationGrid', workstations.slice(0, 2));
            renderGrid('pcGrid', pcs.slice(0, 2));
        } catch (err) {
            console.error('加载失败:', err);
            document.getElementById('serverGrid').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
        }
    }
    
    function renderGrid(gridId, products) {
        const grid = document.getElementById(gridId);
        if (!products.length) {
            grid.innerHTML = '<div class="loading">暂无产品</div>';
            return;
        }
        grid.innerHTML = products.map(p => `
            <a href="product.html?slug=${p.slug}" class="product-card">
                <h3>${p.name}</h3>
                <p>${p.description || ''}</p>
                <div class="price">${p.price || '询价'}</div>
            </a>
        `).join('');
    }
    
    loadProducts();
</script>
</body>
</html>
